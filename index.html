<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private & Global Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Modern Dark Theme - Discord Inspired */
        :root {
            --primary: #5865f2;
            --bg: #313338;
            --sidebar: #2b2d31;
            --text: #dbdee1;
            --input-bg: #1e1f22;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 600px;
            height: 90vh;
            background: var(--sidebar);
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        h1 { 
            font-size: 1.2rem; 
            padding: 15px; 
            margin: 0; 
            background: rgba(0,0,0,0.2);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .section {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input, textarea {
            background: var(--input-bg);
            border: 1px solid #444;
            padding: 12px;
            border-radius: 4px;
            color: white;
            outline: none;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-weight: bold;
            transition: background 0.2s;
            background: var(--primary);
            color: white;
        }

        button:hover { background: #4752c4; }

        .view-controls {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 5px;
            gap: 5px;
        }

        .view-btn {
            flex: 1;
            background: transparent;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .view-btn.active {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }

        /* Message Bubbles */
        .msg-item {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            background: #383a40;
            color: #fff;
            align-self: flex-start;
            font-size: 0.95rem;
        }

        .msg-me {
            background: var(--primary);
            align-self: flex-end;
        }

        .msg-sender {
            font-size: 0.7rem;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            color: #b5bac1;
        }

        .status-bar {
            font-size: 0.75rem;
            text-align: center;
            padding: 5px;
            background: #232428;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Messenger v6</h1>

    <div class="section">
        <input type="email" id="myEmail" placeholder="Your Email (Login)">
        <button onclick="enableNotifications()">Login & Enable Alerts</button>
    </div>

    <div class="status-bar" id="status">Status: Offline</div>

    <div class="view-controls">
        <button class="view-btn active" id="btnPriv" onclick="setView('private')">Private</button>
        <button class="view-btn" id="btnGlob" onclick="setView('global')">Global</button>
    </div>

    <div id="chat-box">
        <p style="text-align: center;">Login to load chat history.</p>
    </div>

    <div class="section">
        <input type="text" id="toEmail" placeholder="Recipient's Email (Empty for Global)">
        <textarea id="msgInput" rows="2" placeholder="Message..."></textarea>
        <button style="background-color: #248046;" onclick="send()">Send Message</button>
    </div>
</div>
<br>
<p>v7</p>

<script src="script.js"></script>

</body>
</html>
