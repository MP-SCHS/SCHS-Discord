<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private & Global Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
    <link rel="stylesheet" href="style.css">
    </style>
</head>
<body>

<div class="container">
    <h1>Messenger</h1>

    <div class="section">
        <strong>1. Identify Yourself</strong>
        <input type="email" id="myEmail" placeholder="Enter your email to log in">
        <button class="btn-primary" onclick="enableNotifications()">Login & Enable Alerts</button>
    </div>

    <div class="status-bar" id="status">Not Logged In</div>

    <div class="view-controls">
        <button class="view-btn" id="btnPriv" onclick="setView('private')">Private Inbox</button>
        <button class="view-btn" id="btnGlob" onclick="setView('global')">General Chat</button>
    </div>

    <div id="chat-box">
        <p style="text-align: center; color: #999;">Please log in to see messages.</p>
    </div>

    <div class="section" style="background: #e7f3ff;">
        <strong>2. New Message</strong>
        <input type="text" id="toEmail" placeholder="Recipient's Email (Leave blank for Global)">
        <textarea id="msgInput" rows="2" placeholder="Write something..."></textarea>
        <button class="btn-primary" style="background-color: #42b72a;" onclick="send()">Send Message</button>
    </div>
</div>
<p>v6</p>

<script src="script.js"></script>

</body>
</html>
