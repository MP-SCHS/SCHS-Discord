<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private & Global Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>SCHS Discord V8</h1>

    <div class="section">
        <input type="email" id="myEmail" placeholder="Your Email (Login)">
        <button onclick="enableNotifications()">Login & Enable Alerts</button>
    </div>

    <div class="status-bar" id="status">Status: Offline</div>

    <div class="view-controls">
        <button class="view-btn active" id="btnPriv" onclick="setView('private')">Private</button>
        <button class="view-btn" id="btnGlob" onclick="setView('global')">Global</button>
    </div>

    <div id="chat-box">
        <p style="text-align: center;">Login to load chat history.</p>
    </div>

    <div class="section">
        <input type="text" id="toEmail" placeholder="Recipient's Email (Empty for Global)">
        <textarea id="msgInput" rows="2" placeholder="Message..."></textarea>
        <button style="background-color: #248046;" onclick="send()">Send Message</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
