<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Desktop Alerter</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Messenger Alert System</h1>
    
    <div id="setup">
        <button onclick="enableNotifications()">1. Enable Notifications</button>
    </div>

    <hr>

    <div id="messaging">
        <input type="text" id="emailInput" placeholder="Your Email">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button onclick="send()">Send Message</button>
    </div>

    <p>Status: <span id="status">Waiting...</span></p>
    <br>
    <div id="chat-box" style="height: 200px; overflow-y: scroll; border: 1px solid #ccc; margin: 10px 0; padding: 10px;">
    </div>
    <br>
    <div id="chat-box" style="height: 300px; overflow-y: auto; border: 2px solid #333; background: #f9f9f9; padding: 10px; margin-bottom: 10px; font-family: sans-serif;">
    <p><em>Loading messages...</em></p>
  </div>
  <br>
    <p>v3</p>

    <script src="script.js"></script>
</body>
</html>
