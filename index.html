<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px;">
    <h1>Private Messenger</h1>
    
    <div style="background: #eee; padding: 15px; border-radius: 8px;">
        <h3>1. Login</h3>
        <input type="text" id="myEmail" placeholder="Your Email (to receive alerts)">
        <button onclick="enableNotifications()">Save & Enable Alerts</button>
    </div>

    <div id="chat-box" style="height: 300px; overflow-y: auto; border: 2px solid #333; background: #fff; padding: 10px; margin: 20px 0;">
        <p><em>Log in to see messages...</em></p>
    </div>

    <div style="background: #e7f3ff; padding: 15px; border-radius: 8px;">
        <h3>2. Send a Message</h3>
        <input type="text" id="toEmail" placeholder="Recipient's Email">
        <br><br>
        <textarea id="msgInput" placeholder="Type your message..." style="width: 100%"></textarea>
        <br><br>
        <button onclick="send()" style="width: 100%; padding: 10px;">Send Private Message</button>
    </div>
    <br>
    <p>v5</p>

    <script src="script.js"></script>
</body>
</html>
